name: 'Validate hardware designs' 
on:
  # Runs on pull_requests targeting the default branch
  pull_request:
    branches:
      - master
    paths:
      - hardware/module/side_panel/src/**
      - hardware/module/encoder_wheel/src/**
      - hardware/top_connector/src/**
      - hardware/controller/src/**
      - .devcontainer/ecad-mcad/**
      - .github/workflows/hardware_validation.yml
      
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
env:
  CI_ARG: ${{ github.ref == 'refs/heads/main' && '' || '--dry-run' }}  # Full run on main brach, dry-run on other branches

jobs:
  update_container:
    uses: ./.github/workflows/update_container.yml
    with:
      container: ecad-mcad
      tag: latest

  build_hardware_designs:
    if: ${{ success() || cancelled() }}
    needs: update_container
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/toonvaneyck/ecad-mcad:latest
    steps:
      - name: Checkout (GitHub)
        uses: actions/checkout@v4
        with:
          lfs: 'true'
          fetch-depth: 0 # fetch all history for tags
          fetch-tags: true

      - name: Run KiBot
        run: ./hardware/ci-script-kibot.sh ${CI_ARG}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hardware
          path: build/hardware/
